name: Build & publish

on:
  push:
    branches:
      - main
      - git-as-service
      - admin-panel
      - ui-upgrade
      - Fit-add
      - k8s
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Images PAR SERVICE (déploiement Kubernetes microservices).
  # Construit chaque services/<svc>/Dockerfile et le pousse en
  # ghcr.io/theelse2098/overleaf-artishow-<svc>:<TAG>.
  # NB : build assez lourd (web/webpack). Ajoute/retire des branches ci-dessus
  # pour maîtriser la conso CI.
  # ---------------------------------------------------------------------------
  build-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - web
          - git
          - clsi
          - docstore
          - filestore
          - document-updater
          - project-history
          - history-v1
          - chat
          - notifications
          - real-time
          # NB : "references" est volontairement exclu. Son Dockerfile (npm + node 20)
          # attend un package-lock.json et un dossier patches/ à la racine, ce monorepo
          # est en yarn → Dockerfile incompatible. À régénérer avant de l'ajouter.
        include:
          # clsi embarque TeXLive (étape "with-texlive" du Dockerfile) pour compiler
          # le LaTeX, conformément au déploiement K8s (overleaf-toolkit/k8s).
          # Build lourd (image multi-Go, plus long). L'étape with-texlive a été
          # corrigée (install directe de texlive-full au lieu de apt-cache|xargs).
          - service: clsi
            target: with-texlive
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login into ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag based on branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH_NAME" = "main" ]; then
            TAG="latest"
          elif [ "$BRANCH_NAME" = "git_integration" ]; then
            TAG="git"
          elif [ "$BRANCH_NAME" = "template_integration" ]; then
            TAG="template"
          elif [ "$BRANCH_NAME" = "git_compilation" ]; then
            TAG="git-compilation"
          elif [ "$BRANCH_NAME" = "overleaf" ]; then
            TAG="overleaf"
          elif [ "$BRANCH_NAME" = "ginit_ui" ]; then
            TAG="ginit_ui"
          elif [ "$BRANCH_NAME" = "git-as-service" ]; then
            TAG="git-service"
          elif [ "$BRANCH_NAME" = "admin-panel" ]; then
            TAG="admin"
          elif [ "$BRANCH_NAME" = "ui-upgrade" ]; then
            TAG="ui-upgrade"
          elif [ "$BRANCH_NAME" = "Fit-add" ]; then
            TAG="Fit-add"
          else
            TAG=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/theelse2098/overleaf-artishow-${{ matrix.service }}:${{ env.TAG }}
            ghcr.io/theelse2098/overleaf-artishow-${{ matrix.service }}:${{ github.sha }}

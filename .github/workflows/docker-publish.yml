name: Build & publish

on:
  push:
    branches:
      - main
      - git-as-service
      - k8s
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Images PAR SERVICE (déploiement Kubernetes microservices).
  # Construit chaque services/<svc>/Dockerfile et le pousse en
  # ghcr.io/theelse2098/overleaf-artishow-<svc>:<TAG>.
  # NB : build assez lourd (web/webpack). Ajoute/retire des branches ci-dessus
  # pour maîtriser la conso CI.
  # ---------------------------------------------------------------------------
  build-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - web
          - git
          - clsi
          - docstore
          - filestore
          - document-updater
          - project-history
          - history-v1
          - chat
          - notifications
          - real-time
          # NB : "references" est volontairement exclu. Son Dockerfile (npm + node 20)
          # attend un package-lock.json et un dossier patches/ à la racine, ce monorepo
          # est en yarn → Dockerfile incompatible. À régénérer avant de l'ajouter.
        include:
          # clsi DOIT embarquer TeXLive pour compiler (étape "with-texlive" du Dockerfile).
          # Build lourd (image multi-Go, plus long) ; retire ce bloc pour revenir à
          # l'étape légère "app" (sans compilation LaTeX).
          - service: clsi
            target: with-texlive
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login into ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag based on branch
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          if [ "$BRANCH_NAME" = "main" ]; then
            TAG="latest"
          else
            TAG=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g')
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Build & push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/theelse2098/overleaf-artishow-${{ matrix.service }}:${{ env.TAG }}
            ghcr.io/theelse2098/overleaf-artishow-${{ matrix.service }}:${{ github.sha }}
